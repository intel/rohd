name: rohd_devtools_extension
description: "DevTool extension on ROHD."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
 sdk: ^3.6.0
  
dependencies:
  devtools_app_shared: ^0.5.0
  devtools_extensions: ^0.5.0
  dtd: ^4.0.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_simple_treeview: ^3.0.2
  logging: ^1.2.0
  rohd_devtools_widgets:
    path: packages/rohd_devtools_widgets
  vm_service: ^14.3.1
  web: ^1.0.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  devtools_shared: ^13.0.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.2
  path: ^1.9.0
  
flutter:
  uses-material-design: true
  assets:
    - assets/help/
    - assets/icons/

dependency_overrides:
  rohd:
    path: ../
